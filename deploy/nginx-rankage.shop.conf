# rankage.shop — Nginx reverse proxy
# Copy to /etc/nginx/sites-available/rankage.shop then:
#   sudo ln -s /etc/nginx/sites-available/rankage.shop /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d rankage.shop -d www.rankage.shop -d api.rankage.shop

# HTTP → HTTPS redirect
server {
  listen 80;
  listen [::]:80;
  server_name rankage.shop www.rankage.shop api.rankage.shop;
  return 301 https://$host$request_uri;
}

# Frontend — rankage.shop
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name rankage.shop www.rankage.shop;

  ssl_certificate /etc/letsencrypt/live/rankage.shop/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/rankage.shop/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}

# Backend API — api.rankage.shop
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.rankage.shop;

  ssl_certificate /etc/letsencrypt/live/rankage.shop/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/rankage.shop/privkey.pem;

  client_max_body_size 5m;

  location /uploads/ {
    alias /var/www/mvpmms/backend/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
