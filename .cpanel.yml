---
# Git deployment hook for cPanel (optional)
# cPanel → Git Version Control → Manage → Deploy HEAD Commit
deployment:
  tasks:
    - export DEPLOY_PATH=/home/USER/mvpmms
    - export NODE_ENV=production
    - export NODE_OPTIONS=--max-old-space-size=512
    - cd $DEPLOY_PATH/backend && npm ci --omit=dev && npx prisma generate && npm run build
    - cd $DEPLOY_PATH/frontend && npm ci --omit=dev && npm run build
    - touch $DEPLOY_PATH/backend/tmp/restart.txt 2>/dev/null || true
    - touch $DEPLOY_PATH/frontend/tmp/restart.txt 2>/dev/null || true
